<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFM Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link id="hljs-dark" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<link id="hljs-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" disabled>
<style>
  /* ══════════════════════════════════════════════
     DARK THEME (default)
     ══════════════════════════════════════════════ */
  [data-theme="dark"] {
    --bg-deep: #0d1117;
    --bg-editor: #0d1117;
    --bg-preview: #161b22;
    --bg-surface: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --accent-glow: rgba(88, 166, 255, 0.15);
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --strong-color: #ffffff;
    --code-bg: #21262d;
    --pre-bg: #0d1117;
    --blockquote-bg: rgba(88, 166, 255, 0.08);
    --checkbox-bg: #58a6ff;
    --table-stripe: rgba(255, 255, 255, 0.02);
    --selection: rgba(88, 166, 255, 0.25);
    --toggle-bg: #30363d;
    --toggle-knob: #e6edf3;
    --shadow-soft: rgba(0, 0, 0, 0.3);
  }

  /* ══════════════════════════════════════════════
     LIGHT THEME
     ══════════════════════════════════════════════ */
  [data-theme="light"] {
    --bg-deep: #f6f8fa;
    --bg-editor: #ffffff;
    --bg-preview: #ffffff;
    --bg-surface: #f0f2f5;
    --border: #d1d9e0;
    --text-primary: #1f2328;
    --text-secondary: #59636e;
    --text-muted: #8b949e;
    --accent: #0969da;
    --accent-glow: rgba(9, 105, 218, 0.1);
    --green: #1a7f37;
    --orange: #9a6700;
    --red: #d1242f;
    --purple: #8250df;
    --strong-color: #1f2328;
    --code-bg: #eff1f3;
    --pre-bg: #f6f8fa;
    --blockquote-bg: rgba(9, 105, 218, 0.06);
    --checkbox-bg: #0969da;
    --table-stripe: rgba(0, 0, 0, 0.02);
    --selection: rgba(9, 105, 218, 0.2);
    --toggle-bg: #d1d9e0;
    --toggle-knob: #ffffff;
    --shadow-soft: rgba(0, 0, 0, 0.08);
  }

  /* ══════════════════════════════════════════════
     SMOOTH TRANSITIONS ON THEME SWITCH
     ══════════════════════════════════════════════ */
  html.theme-transitioning,
  html.theme-transitioning *,
  html.theme-transitioning *::before,
  html.theme-transitioning *::after {
    transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease !important;
  }

  /* ══════════════════════════════════════════════
     BASE
     ══════════════════════════════════════════════ */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 48px;
    padding: 0 20px;
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
  }

  .logo svg { opacity: 0.9; }

  .logo span {
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--accent-glow);
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .toolbar-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .toolbar-btn {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .toolbar-btn:hover {
    background: var(--border);
    color: var(--text-primary);
  }

  /* ── Theme Toggle Switch ── */
  .theme-toggle-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-left: 6px;
    padding-left: 12px;
    border-left: 1px solid var(--border);
  }

  .theme-icon {
    display: flex;
    align-items: center;
    color: var(--text-muted);
    transition: color 0.3s, transform 0.3s;
  }

  .theme-icon.active {
    color: var(--accent);
    transform: scale(1.15);
  }

  .theme-toggle {
    position: relative;
    width: 40px;
    height: 22px;
    cursor: pointer;
  }

  .theme-toggle input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--toggle-bg);
    border-radius: 11px;
    border: 1px solid var(--border);
    transition: background 0.3s, border-color 0.3s;
  }

  .toggle-knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    background: var(--toggle-knob);
    border-radius: 50%;
    box-shadow: 0 1px 3px var(--shadow-soft);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
  }

  .theme-toggle input:checked ~ .toggle-knob {
    transform: translateX(18px);
  }

  /* ── Panels ── */
  .panels {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-header .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .editor-dot { background: var(--green); box-shadow: 0 0 6px color-mix(in srgb, var(--green) 40%, transparent); }
  .preview-dot { background: var(--accent); box-shadow: 0 0 6px color-mix(in srgb, var(--accent) 40%, transparent); }

  .editor-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-editor);
  }

  textarea {
    width: 100%;
    height: 100%;
    background: transparent;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.7;
    border: none;
    outline: none;
    resize: none;
    padding: 20px 24px;
    tab-size: 2;
    caret-color: var(--accent);
  }

  textarea::selection { background: var(--selection); }
  textarea::placeholder { color: var(--text-muted); }
  textarea.no-wrap { white-space: pre; overflow-x: auto; }
  textarea.wrap { white-space: pre-wrap; word-wrap: break-word; }

  /* ── Divider ── */
  .divider {
    width: 1px;
    background: var(--border);
    position: relative;
    cursor: col-resize;
    flex-shrink: 0;
    z-index: 10;
  }

  .divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 3px;
    height: 40px;
    border-radius: 3px;
    background: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .divider:hover::before { opacity: 0.5; }
  .divider:hover { background: var(--accent); }

  /* ── Preview ── */
  .preview-wrap {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-preview);
    padding: 32px 40px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .preview-wrap::-webkit-scrollbar { width: 6px; }
  .preview-wrap::-webkit-scrollbar-track { background: transparent; }
  .preview-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ══════════════════════════════════════════════
     GFM MARKDOWN STYLES
     ══════════════════════════════════════════════ */
  .markdown-body {
    max-width: 780px;
    font-size: 15px;
    line-height: 1.75;
    color: var(--text-primary);
  }

  .markdown-body h1, .markdown-body h2, .markdown-body h3,
  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    margin-top: 1.5em;
    margin-bottom: 0.6em;
    line-height: 1.3;
    color: var(--text-primary);
  }

  .markdown-body h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
  .markdown-body h2 { font-size: 1.5em; padding-bottom: 0.25em; border-bottom: 1px solid var(--border); }
  .markdown-body h3 { font-size: 1.25em; }
  .markdown-body h4 { font-size: 1em; }

  .markdown-body p { margin-bottom: 1em; }

  .markdown-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .markdown-body a:hover { border-bottom-color: var(--accent); }

  .markdown-body strong { font-weight: 700; color: var(--strong-color); }
  .markdown-body em { font-style: italic; }
  .markdown-body del { color: var(--text-secondary); }

  .markdown-body code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--code-bg);
    padding: 0.2em 0.45em;
    border-radius: 5px;
    border: 1px solid var(--border);
    color: var(--orange);
  }

  .markdown-body pre {
    background: var(--pre-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    margin-bottom: 1em;
  }

  .markdown-body pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    color: var(--text-primary);
  }

  .markdown-body blockquote {
    border-left: 3px solid var(--accent);
    padding: 2px 16px;
    margin: 0 0 1em 0;
    color: var(--text-secondary);
    background: var(--blockquote-bg);
    border-radius: 0 6px 6px 0;
  }

  .markdown-body blockquote p { margin-bottom: 0.4em; }

  .markdown-body ul, .markdown-body ol {
    padding-left: 2em;
    margin-bottom: 1em;
  }

  .markdown-body li { margin-bottom: 0.35em; }
  .markdown-body li > ul, .markdown-body li > ol { margin-bottom: 0; }

  .markdown-body li input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 15px;
    height: 15px;
    border: 2px solid var(--border);
    border-radius: 3px;
    vertical-align: middle;
    position: relative;
    top: -1px;
    margin-right: 6px;
    cursor: default;
  }

  .markdown-body li input[type="checkbox"]:checked {
    background: var(--checkbox-bg);
    border-color: var(--checkbox-bg);
  }

  .markdown-body li input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: -2px;
    left: 1px;
    font-size: 11px;
    color: #fff;
    font-weight: bold;
  }

  .markdown-body table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 1em;
    font-size: 14px;
  }

  .markdown-body th, .markdown-body td {
    border: 1px solid var(--border);
    padding: 8px 14px;
    text-align: left;
  }

  .markdown-body th {
    background: var(--bg-surface);
    font-weight: 600;
    color: var(--text-primary);
  }

  .markdown-body tr:nth-child(2n) { background: var(--table-stripe); }

  .markdown-body hr {
    border: none;
    height: 1px;
    background: var(--border);
    margin: 2em 0;
  }

  .markdown-body img {
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .markdown-body .emoji {
    font-style: normal;
    font-size: 1.15em;
    vertical-align: -0.1em;
  }

  /* ── Subscript / Superscript / Underline ── */
  .markdown-body sub {
    font-size: 0.8em;
    vertical-align: sub;
  }

  .markdown-body sup {
    font-size: 0.8em;
    vertical-align: super;
  }

  .markdown-body ins {
    text-decoration: underline;
    text-decoration-color: var(--text-muted);
    text-underline-offset: 2px;
  }

  /* ── Footnotes ── */
  .markdown-body .footnote-ref a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.85em;
    padding: 0 2px;
  }

  .markdown-body .footnote-ref a:hover {
    text-decoration: underline;
  }

  .markdown-body .footnotes {
    margin-top: 2em;
    font-size: 0.9em;
    color: var(--text-secondary);
  }

  .markdown-body .footnotes-sep {
    margin-bottom: 1em;
  }

  .markdown-body .footnotes-list {
    padding-left: 1.5em;
  }

  .markdown-body .footnote-item {
    margin-bottom: 0.4em;
  }

  .markdown-body .footnote-item p {
    margin-bottom: 0.2em;
    display: inline;
  }

  .markdown-body .footnote-backref {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9em;
    margin-left: 4px;
  }

  .markdown-body .footnote-backref:hover {
    text-decoration: underline;
  }

  /* ── Color Chips ── */
  .markdown-body .color-chip {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    vertical-align: -1px;
    margin-right: 5px;
  }

  /* ── GFM Alerts ── */
  .markdown-body .markdown-alert {
    padding: 12px 16px;
    margin: 0 0 1em 0;
    border-left: 4px solid;
    border-radius: 0 6px 6px 0;
  }

  .markdown-body .markdown-alert p { margin-bottom: 0.4em; }
  .markdown-body .markdown-alert p:last-child { margin-bottom: 0; }

  .markdown-body .markdown-alert-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
    line-height: 1;
  }

  .markdown-body .markdown-alert-title svg {
    flex-shrink: 0;
  }

  /* NOTE */
  .markdown-body .markdown-alert-note {
    border-left-color: var(--accent);
    background: rgba(88, 166, 255, 0.08);
  }
  [data-theme="light"] .markdown-body .markdown-alert-note {
    background: rgba(9, 105, 218, 0.06);
  }
  .markdown-body .markdown-alert-note .markdown-alert-title {
    color: var(--accent);
  }

  /* TIP */
  .markdown-body .markdown-alert-tip {
    border-left-color: var(--green);
    background: rgba(63, 185, 80, 0.08);
  }
  [data-theme="light"] .markdown-body .markdown-alert-tip {
    background: rgba(26, 127, 55, 0.06);
  }
  .markdown-body .markdown-alert-tip .markdown-alert-title {
    color: var(--green);
  }

  /* IMPORTANT */
  .markdown-body .markdown-alert-important {
    border-left-color: var(--purple);
    background: rgba(188, 140, 255, 0.08);
  }
  [data-theme="light"] .markdown-body .markdown-alert-important {
    background: rgba(130, 80, 223, 0.06);
  }
  .markdown-body .markdown-alert-important .markdown-alert-title {
    color: var(--purple);
  }

  /* WARNING */
  .markdown-body .markdown-alert-warning {
    border-left-color: var(--orange);
    background: rgba(210, 153, 34, 0.08);
  }
  [data-theme="light"] .markdown-body .markdown-alert-warning {
    background: rgba(154, 103, 0, 0.06);
  }
  .markdown-body .markdown-alert-warning .markdown-alert-title {
    color: var(--orange);
  }

  /* CAUTION */
  .markdown-body .markdown-alert-caution {
    border-left-color: var(--red);
    background: rgba(248, 81, 73, 0.08);
  }
  [data-theme="light"] .markdown-body .markdown-alert-caution {
    background: rgba(209, 36, 47, 0.06);
  }
  .markdown-body .markdown-alert-caution .markdown-alert-title {
    color: var(--red);
  }

  /* ── Status Bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 28px;
    padding: 0 16px;
    background: var(--bg-deep);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }

  .status-bar .left, .status-bar .right {
    display: flex;
    gap: 16px;
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .panels { flex-direction: column; }
    .divider { width: 100%; height: 1px; cursor: row-resize; }
    .divider::before { width: 40px; height: 3px; }
    .preview-wrap { padding: 20px; }
    .theme-toggle-wrap { margin-left: 4px; padding-left: 8px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
        <span>GFM Preview</span>
      </div>
      <div class="badge">Live</div>
    </div>
    <div class="toolbar-actions">
      <button class="toolbar-btn" onclick="toggleWrap()" title="Toggle word wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M3 12h15a3 3 0 1 1 0 6h-4"/><polyline points="13 16 11 18 13 20"/><path d="M3 18h7"/></svg>
        Wrap
      </button>
      <button class="toolbar-btn" onclick="clearEditor()" title="Clear editor">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        Clear
      </button>
      <button class="toolbar-btn" onclick="copyMarkdown()" title="Copy markdown">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>

      <!-- Theme Toggle -->
      <div class="theme-toggle-wrap">
        <div class="theme-icon" id="sunIcon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </div>
        <label class="theme-toggle" title="Toggle light/dark mode">
          <input type="checkbox" id="themeSwitch" checked>
          <div class="toggle-track"></div>
          <div class="toggle-knob"></div>
        </label>
        <div class="theme-icon" id="moonIcon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </div>
      </div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const themeSwitch = document.getElementById('themeSwitch');
const sunIcon = document.getElementById('sunIcon');
const moonIcon = document.getElementById('moonIcon');
const hljsDark = document.getElementById('hljs-dark');
const hljsLight = document.getElementById('hljs-light');

// ── Theme ──────────────────────────────────────
function setTheme(theme, animate = true) {
  if (animate) {
    document.documentElement.classList.add('theme-transitioning');
    setTimeout(() => document.documentElement.classList.remove('theme-transitioning'), 400);
  }

  document.documentElement.setAttribute('data-theme', theme);
  themeSwitch.checked = (theme === 'dark');

  if (theme === 'dark') {
    hljsDark.disabled = false;
    hljsLight.disabled = true;
    sunIcon.classList.remove('active');
    moonIcon.classList.add('active');
  } else {
    hljsDark.disabled = true;
    hljsLight.disabled = false;
    sunIcon.classList.add('active');
    moonIcon.classList.remove('active');
  }

  localStorage.setItem('gfm-theme', theme);
  render();
}

themeSwitch.addEventListener('change', () => {
  setTheme(themeSwitch.checked ? 'dark' : 'light');
});

// Init from saved preference or system preference
(function initTheme() {
  const saved = localStorage.getItem('gfm-theme');
  if (saved) {
    setTheme(saved, false);
  } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    setTheme('light', false);
  } else {
    setTheme('dark', false);
  }
})();

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
  if (!localStorage.getItem('gfm-theme')) {
    setTheme(e.matches ? 'dark' : 'light');
  }
});

// ── Marked emoji extension ─────────────────────
const emojiExtension = {
  name: 'emoji',
  level: 'inline',
  start(src) { return src.indexOf(':'); },
  tokenizer(src) {
    const match = src.match(/^:([a-zA-Z0-9_+-]+):/);
    if (match && emojiMap[match[1]]) {
      return {
        type: 'emoji',
        raw: match[0],
        emoji: emojiMap[match[1]]
      };
    }
  },
  renderer(token) {
    return `<span class="emoji" title=":${token.raw.slice(1,-1)}:">${token.emoji}</span>`;
  }
};

// ── Marked footnote extension ──────────────────
const footnoteRefExtension = {
  name: 'footnoteRef',
  level: 'inline',
  start(src) { return src.indexOf('[^'); },
  tokenizer(src) {
    const match = src.match(/^\[\^([^\]]+)\]/);
    if (match) {
      return {
        type: 'footnoteRef',
        raw: match[0],
        id: match[1]
      };
    }
  },
  renderer(token) {
    const id = token.id;
    return `<sup class="footnote-ref"><a href="#fn-${id}" id="fnref-${id}">[${id}]</a></sup>`;
  }
};

marked.use({ extensions: [emojiExtension, footnoteRefExtension] });

// ── Marked config ──────────────────────────────
marked.setOptions({
  gfm: true,
  breaks: true,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
    }
    try { return hljs.highlightAuto(code).value; } catch(e) {}
    return code;
  }
});

const alertLabels = {
  note: 'Note',
  tip: 'Tip',
  important: 'Important',
  warning: 'Warning',
  caution: 'Caution'
};

function processAlerts(html) {
  // Match blockquotes whose first line contains [!NOTE], [!TIP], etc.
  const alertRegex = /<blockquote>\s*<p>\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*<br\s*\/?>\s*/gi;
  
  // Also handle when the alert tag is on its own <p> line
  const alertRegex2 = /<blockquote>\s*<p>\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*<\/p>/gi;

  html = html.replace(alertRegex, (match, type) => {
    const t = type.toLowerCase();
    return `<div class="markdown-alert markdown-alert-${t}"><p class="markdown-alert-title">${alertIcons[t]} ${alertLabels[t]}</p><p>`;
  });

  html = html.replace(alertRegex2, (match, type) => {
    const t = type.toLowerCase();
    return `<div class="markdown-alert markdown-alert-${t}"><p class="markdown-alert-title">${alertIcons[t]} ${alertLabels[t]}</p>`;
  });

  // Close the div where blockquote was closed
  // We need to match the corresponding </blockquote> for alerts we converted
  // Simple approach: replace </blockquote> that follows an alert div
  const parts = html.split(/(<div class="markdown-alert[^"]*">)/);
  let result = '';
  let insideAlert = 0;

  for (let i = 0; i < parts.length; i++) {
    const part = parts[i];
    if (part.match(/^<div class="markdown-alert/)) {
      insideAlert++;
      result += part;
    } else if (insideAlert > 0) {
      // Replace the first </blockquote> with </div>
      const idx = part.indexOf('</blockquote>');
      if (idx !== -1) {
        result += part.substring(0, idx) + '</div>' + part.substring(idx + 13);
        insideAlert--;
      } else {
        result += part;
      }
    } else {
      result += part;
    }
  }

  return result;
}

// ── Footnote block processing ──────────────────
function processFootnotes(md) {
  // Extract footnote definitions: [^id]: content
  const footnotes = {};
  const cleaned = md.replace(/^\[\^([^\]]+)\]:\s*(.+)$/gm, (match, id, content) => {
    footnotes[id] = content;
    return ''; // remove definition from body
  });
  return { cleaned, footnotes };
}

function renderFootnoteSection(footnotes) {
  const ids = Object.keys(footnotes);
  if (ids.length === 0) return '';
  let html = '<section class="footnotes"><hr class="footnotes-sep"><ol class="footnotes-list">';
  for (const id of ids) {
    html += `<li id="fn-${id}" class="footnote-item"><p>${marked.parseInline(footnotes[id])} <a href="#fnref-${id}" class="footnote-backref">↩</a></p></li>`;
  }
  html += '</ol></section>';
  return html;
}

// ── Color chip processing ──────────────────────
function processColorChips(html) {
  // Match inline <code> tags containing color values
  // HEX: #RGB, #RRGGBB, #RRGGBBAA
  html = html.replace(/<code>(#(?:[0-9a-fA-F]{3,4}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8}))<\/code>/g, (match, color) => {
    return `<code><span class="color-chip" style="background:${color}"></span>${color}</code>`;
  });

  // RGB: rgb(r, g, b) or rgba(r, g, b, a)
  html = html.replace(/<code>(rgba?\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*(?:,\s*[\d.]+\s*)?\))<\/code>/g, (match, color) => {
    return `<code><span class="color-chip" style="background:${color}"></span>${color}</code>`;
  });

  // HSL: hsl(h, s%, l%) or hsla(h, s%, l%, a)
  html = html.replace(/<code>(hsla?\(\s*\d{1,3}\s*,\s*\d{1,3}%\s*,\s*\d{1,3}%\s*(?:,\s*[\d.]+\s*)?\))<\/code>/g, (match, color) => {
    return `<code><span class="color-chip" style="background:${color}"></span>${color}</code>`;
  });

  return html;
}

// ── HTML comment removal ───────────────────────
function removeHtmlComments(md) {
  return md.replace(/<!--[\s\S]*?-->/g, '');
}

// ── Render & Stats ─────────────────────────────
function render() {
  // Pre-process: extract footnotes, remove HTML comments
  let md = editor.value;
  md = removeHtmlComments(md);
  const { cleaned, footnotes } = processFootnotes(md);

  let html = marked.parse(cleaned);
  html = processAlerts(html);
  html = processColorChips(html);
  html += renderFootnoteSection(footnotes);

  preview.innerHTML = html;
  updateStats();
}

function updateStats() {
  const text = editor.value;
  const chars = text.length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const lines = text.split('\n').length;
  document.getElementById('charCount').textContent = `${chars} chars`;
  document.getElementById('wordCount').textContent = `${words} words`;
  document.getElementById('lineCount').textContent = `${lines} line${lines !== 1 ? 's' : ''}`;
}

editor.addEventListener('input', render);

editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 2;
    render();
  }
});

// ── Toolbar actions ────────────────────────────
function toggleWrap() {
  editor.classList.toggle('wrap');
  editor.classList.toggle('no-wrap');
}

function clearEditor() {
  editor.value = '';
  render();
}

function copyMarkdown() {
  navigator.clipboard.writeText(editor.value).then(() => {
    const btn = event.target.closest('.toolbar-btn');
    const original = btn.innerHTML;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.innerHTML = original; btn.style.color = ''; }, 1500);
  });
}

// ── Resizable divider ──────────────────────────
const divider = document.getElementById('divider');
const editorPanel = document.getElementById('editorPanel');
const previewPanel = document.getElementById('previewPanel');
let isDragging = false;

divider.addEventListener('mousedown', () => {
  isDragging = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const container = document.querySelector('.panels');
  const rect = container.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  const clamped = Math.min(Math.max(pct, 20), 80);
  editorPanel.style.flex = `0 0 ${clamped}%`;
  previewPanel.style.flex = `0 0 ${100 - clamped}%`;
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// ── Synchronized scrolling ─────────────────────
const previewWrap = document.querySelector('.preview-wrap');

editor.addEventListener('scroll', () => {
  const pct = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
  previewWrap.scrollTop = pct * (previewWrap.scrollHeight - previewWrap.clientHeight);
});

// Initial render
render();
