<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Flavored Markdown Editor</title>
    
    <!-- GitHub Markdown CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">
    
    <!-- Marked.js for parsing markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #24292f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Header */
        header {
            background: #f6f8fa;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #d0d7de;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #24292f;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .github-logo {
            width: 32px;
            height: 32px;
        }
        
        /* Main container */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* Left panel - Editor */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #d0d7de;
            background: #ffffff;
        }
        
        .panel-header {
            background: #f6f8fa;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #d0d7de;
            font-weight: 600;
            font-size: 0.875rem;
            color: #57606a;
        }
        
        #markdown-editor {
            flex: 1;
            background: #ffffff;
            color: #24292f;
            border: none;
            padding: 1.5rem;
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            overflow-y: auto;
        }
        
        #markdown-editor::placeholder {
            color: #6e7781;
        }
        
        /* Right panel - Preview */
        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }
        
        .preview-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        /* GitHub markdown styling adjustments */
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 100%;
            padding: 0;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        
        ::-webkit-scrollbar-track {
            background: #ffffff;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #d0d7de;
            border-radius: 6px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #afb8c1;
        }
        
        /* Buttons */
        .header-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        button {
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            color: #24292f;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #ffffff;
            border-color: #1f2328;
        }
        
        button:active {
            background: #ebecf0;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .editor-panel {
                border-right: none;
                border-bottom: 1px solid #d0d7de;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>
            <svg class="github-logo" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            GitHub Flavored Markdown Editor
        </h1>
        <div class="header-actions">
            <button id="copy-btn">📋 Copy Markdown</button>
            <button id="clear-btn">🗑️ Clear</button>
        </div>
    </header>
    
    <div class="container">
        <!-- Left Panel: Editor -->
        <div class="editor-panel">
            <div class="panel-header">MARKDOWN</div>
            <textarea id="markdown-editor" placeholder="Type your GitHub Flavored Markdown here..."></textarea>
        </div>
        
        <!-- Right Panel: Preview -->
        <div class="preview-panel">
            <div class="panel-header">PREVIEW</div>
            <div class="preview-content">
                <article class="markdown-body" id="preview-output"></article>
            </div>
        </div>
    </div>
    
    <script>
        // Configure marked for GitHub Flavored Markdown
        marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: true,
            mangle: false
        });
        
        // Default sample content
        const defaultMarkdown = `# Welcome to GitHub Flavored Markdown Editor

### Getting Started

> "Documentation is a love letter that you write to your future self." - Damian Conway

## Installation

\`\`\`bash
npm install my-awesome-project
cd my-awesome-project
npm start
\`\`\`

## Features

This editor supports all GitHub Flavored Markdown features:

1. **Headings** with auto-generated IDs
2. **Code blocks** with syntax highlighting
3. **Tables** with alignment
4. **Task lists** with checkboxes
5. **Emojis** and special characters

## Quick Example

Here's some inline code: \`const greeting = "Hello, World!";\`

### JavaScript Function

\`\`\`javascript
function fibonacci(n) {
  if (n <= 1) return n;
  return fibonacci(n - 1) + fibonacci(n - 2);
}

console.log(fibonacci(10)); // Output: 55
\`\`\`

### Python Example

\`\`\`python
def greet(name):
    return f"Hello, {name}! 👋"

print(greet("Developer"))
\`\`\`

## Links and Images

Check out the [GitHub Documentation](https://docs.github.com) for more information.

![Sample Image](https://via.placeholder.com/600x200/238636/ffffff?text=GitHub+Markdown+Sample)

## Task Lists

- [x] Learn Markdown basics
- [x] Understand GFM extensions
- [ ] Build something awesome
- [ ] Share with the community

## Emojis

GitHub supports emoji shortcodes! 🎉

- :rocket: = 🚀
- :heart: = ❤️
- :star: = ⭐
- :tada: = 🎉
- :sparkles: = ✨

## Tables

| Feature | Supported | Notes |
|---------|:---------:|-------|
| Headings | ✅ | H1 through H6 |
| Code Blocks | ✅ | With syntax highlighting |
| Tables | ✅ | With alignment |
| Task Lists | ✅ | Interactive checkboxes |
| Emojis | ✅ | :heart: syntax |
| Strikethrough | ✅ | ~~like this~~ |

## Text Formatting

You can make text **bold**, *italic*, or ***both***.

You can also ~~strike through~~ text.

## Blockquotes

> This is a simple blockquote.
> 
> It can span multiple lines.
> 
> > And even be nested!

## Horizontal Rule

---

## Lists

### Unordered List

- First item
- Second item
  - Nested item
  - Another nested item
- Third item

### Ordered List

1. First step
2. Second step
   1. Sub-step A
   2. Sub-step B
3. Third step

## Code and Syntax

Inline code: \`git commit -m "Update README"\`

Block code:

\`\`\`
git add .
git commit -m "Initial commit"
git push origin main
\`\`\`

---

**Happy Markdown writing!** ✨
`;
        
        const editor = document.getElementById('markdown-editor');
        const preview = document.getElementById('preview-output');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        
        // Render markdown to preview
        function renderMarkdown() {
            const markdown = editor.value;
            preview.innerHTML = marked.parse(markdown);
        }
        
        // Initialize with default content
        editor.value = defaultMarkdown;
        renderMarkdown();
        
        // Listen for editor changes
        editor.addEventListener('input', renderMarkdown);
        
        // Copy markdown to clipboard
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(editor.value);
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = '📋 Copy Markdown';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
            }
        });
        
        // Clear editor
        clearBtn.addEventListener('click', () => {
            if (confirm('Clear all content?')) {
                editor.value = '';
                renderMarkdown();
            }
        });
        
        // Keyboard shortcuts
        editor.addEventListener('keydown', (e) => {
            // Tab key for indentation
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 2;
            }
        });
    </script>
</body>
</html>
